version: "3.9"
services:
  crypto-db:
    image: postgres:16-alpine
    container_name: crypto_trader_db
    restart: always
    environment:
      POSTGRES_USER: trader_admin
      POSTGRES_PASSWORD: SecretSecurePassword123!
      POSTGRES_DB: cryptotrader_db
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5454:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U trader_admin -d cryptotrader_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  crypto-app:
    build:
      context: .
      dockerfile: src/CryptoTrader.Main/Dockerfile
    container_name: crypto_trader_app
    restart: always
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_HTTP_PORTS=8080
      - TZ=Europe/Kiev
      - ConnectionStrings__DefaultConnection=Host=crypto-db;Port=5432;Database=cryptotrader_db;Username=trader_admin;Password=SecretSecurePassword123!;
    ports:
      - "8888:8080"
    volumes:
      - ./config:/app/config
      - ./logs:/app/logs
    depends_on:
      crypto-db:
        condition: service_healthy

volumes:
  pgdata:
